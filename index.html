<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;

      font-size: inherit;
      color: inherit;
      background: none;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 4rem;
      column-gap: 6rem;

      width: 100vw;
      height: 100vh;

      font-family: sans-serif;

      @media (width < 64rem) {
        flex-direction: column;
      }
    }

    div {
      position: relative;

      width: 12rem;
      height: 12rem;

      border-radius: .5rem;
      border-end-start-radius: 5rem;
      border-end-end-radius: 5rem;

      border-width: 2px;
      border-block-start-width: 1px;
      border-block-end-width: 8px;
      border-style: solid;
      border-color: rgb(0 0 0 / .9);
      border-block-start-color: rgb(0 0 0 / .1);

      &::before {
        content: '';
        display: grid;
        place-content: center;

        font-size: 1.25rem;
        font-weight: 700;

        position: absolute;
        inset: 0;
        inset-block-start: 100%;
        inset-inline: 20%;

        transition-property: color, background-color, inset;
        transition: .2s ease;

        border-end-start-radius: 4.5rem;
        border-end-end-radius: 4.5rem;

        --content-color: rgb(0 0 0 / .1);
        color: oklch(from var(--content-color) calc(0.5 + sign(0.5 - l) * 0.5) c h);
        background-color: var(--content-color);
      }

      &.tea::before {
        content: 'Tea';
        --content-color: rgba(147, 182, 91, 0.5);

        inset-block-start: 10%;
        inset-inline: 0;
      }

      &.coffee::before {
        content: 'Coffee';
        --content-color: rgba(111, 78, 55, 0.99);

        inset-block-start: 25%;
        inset-inline: 0;
      }

      &::after {
        content: '';

        position: absolute;
        left: 100%;
        top: 10%;

        width: 3rem;
        height: 6rem;

        border-start-end-radius: 2rem;
        border-end-end-radius: 3rem;
        border-width: 12px;
        border-inline-start-width: 0;
        border-inline-end-width: 6px;
        border-style: solid;
        border-color: rgb(0 0 0 / .9);
      }

      transition: transform .2s cubic-bezier(0.34, 1.56, 0.64, 1);

      &:hover {
        transform: scale(1.25) rotate(-3deg);
      }

      &[aria-selected="true"] {
        transform: scale(1.15) rotate(-5deg);
      }
    }
  </style>
</head>

<body>
  <div aria-selected="false"></div>
  <div aria-selected="false"></div>
  <div aria-selected="false"></div>

  <script>
    const glasses = document.body.querySelectorAll("div");

    glasses[1].classList.add('coffee');
    glasses[2].classList.add('tea');

    let selectedGlass = null;

    function swapClasses(a, b) {
      const temp = a.className;
      a.className = b.className;
      b.className = temp;
    }

    glasses.forEach(glass => {
      glass.addEventListener('click', () => {
        if (selectedGlass === glass) {
          selectedGlass.setAttribute('aria-selected', 'false');
          selectedGlass = null;
          return;
        } else if (!selectedGlass) {
          glass.setAttribute('aria-selected', 'true');
          selectedGlass = glass;
          return;
        }

        if (glass.classList.length === 0 || selectedGlass.classList.length === 0) {
          swapClasses(glass, selectedGlass);
          selectedGlass.setAttribute('aria-selected', 'false');
          selectedGlass = null;
        }
      });
    });
  </script>
</body>

</html>
